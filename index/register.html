<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CyberShield Register</title>

    <link rel="stylesheet"
          href="css/login.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="login-background"></div>

    <div class="login-container">

        <div class="login-card">

            <h1>CYBERSHIELD</h1>

            <p class="subtitle">
                Create New Account
            </p>

            <form id="registerForm">

                <div class="input-group">

                    <label>Username</label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Masukkan Username"
                        required
                    >

                </div>

                <div class="input-group"> 

                    <div class="input-group">

                     <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Masukkan Email"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Masukkan Password"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Konfirmasi Password</label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Ulangi Password"
                        required
                    >

                </div>

                <button type="submit">
                    DAFTAR
                </button>

            </form>

            <div id="registerMessage"></div>

            <div class="links">

                <a href="login.html">
                    Sudah Punya Akun?
                </a>

                <a href="index.html">
                    Kembali
                </a>

            </div>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>
</html>
